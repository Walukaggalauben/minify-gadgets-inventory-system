<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MINIFY GADGETS Inventory System</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- ===========================
     SIDEBAR
=========================== -->

<div class="sidebar">

    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="MINIFY GADGETS Logo">
    </div>

    <!-- Dashboard -->

    <a href="/dashboard">
        <i class="fas fa-home"></i>
        Dashboard
    </a>

    <!-- Inventory -->

    <div class="menu-title">
        INVENTORY
    </div>

    <a href="/inventory">
        <i class="fas fa-boxes"></i>
        Inventory
    </a>

    <a href="/add_phone">
        <i class="fas fa-plus-circle"></i>
        Add Phone
    </a>

    <a href="/suppliers">
        <i class="fas fa-truck"></i>
        Suppliers
    </a>

    <a href="/purchase_headers">
        <i class="fas fa-file-invoice"></i>
        Purchases
    </a>

    <a href="/imei_management">
        <i class="fas fa-barcode"></i>
        IMEI Management
    </a>

    <!-- Sales -->

    <div class="menu-title">
        SALES
    </div>

    <a href="/sales">
        <i class="fas fa-shopping-cart"></i>
        New Sale
    </a>

    <a href="/sales_history">
        <i class="fas fa-history"></i>
        Sales History
    </a>

    <!-- Customers -->

    <div class="menu-title">
        CUSTOMERS
    </div>

    <a href="/customers">
        <i class="fas fa-users"></i>
        Customers
    </a>

    <!-- Finance -->

    <div class="menu-title">
        FINANCE
    </div>

    <a href="/expenses">
        <i class="fas fa-money-bill-wave"></i>
        Expenses
    </a>

    <a href="#">
        <i class="fas fa-chart-line"></i>
        Reports
    </a>

    <!-- Intelligence -->

    <div class="menu-title">
        INTELLIGENCE
    </div>

    <a href="#">
        <i class="fas fa-brain"></i>
        AI Analytics
    </a>

    <!-- System -->

    <div class="menu-title">
        SYSTEM
    </div>

    <a href="#">
        <i class="fas fa-cog"></i>
        Settings
    </a>

    <a href="/">
        <i class="fas fa-sign-out-alt"></i>
        Logout
    </a>

</div>

<!-- ===========================
     MAIN CONTENT
=========================== -->

<div class="main">

    <div class="header">

        <h2>
            MINIFY GADGETS Inventory System
        </h2>

        <div class="date-box">

            <i class="fas fa-calendar-alt"></i>

            {{ current_date }}

        </div>

    </div>

    <div class="content">

        {% block content %}
        {% endblock %}

    </div>

</div>

</body>

</html>

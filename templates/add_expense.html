{% extends 'layout.html' %}

{% block content %}

<h1>
    <i class="fas fa-money-bill-wave"></i>
    Add Expense
</h1>

<br>

<div class="card">

<form action="/save_expense" method="POST">

    <label><strong>Expense Name</strong></label>

    <br><br>

    <input
        type="text"
        name="expense_name"
        placeholder="Rent, Electricity, Fuel..."
        required
    >

    <br><br>

    <label><strong>Amount (UGX)</strong></label>

    <br><br>

    <input
        type="number"
        name="amount"
        step="0.01"
        min="0"
        placeholder="50000"
        required
    >

    <br><br>

    <button type="submit" class="btn-save">

        <i class="fas fa-save"></i>

        Save Expense

    </button>

    <a href="/expenses" class="btn-view">

        Cancel

    </a>

</form>

</div>

{% endblock %}

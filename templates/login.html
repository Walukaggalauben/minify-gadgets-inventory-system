<!DOCTYPE html>
<html>
<head>

<title>MINIFY GADGETS Login</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:400px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#00695C;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#00695C;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#00897B;
}

</style>

</head>

<body>

<div class="login-box">

<h1>MINIFY GADGETS</h1>

<form>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button type="submit">

Login

</button>

</form>

</div>

</body>
</html>

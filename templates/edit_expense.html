{% extends 'layout.html' %}

{% block content %}

<h1>
    <i class="fas fa-edit"></i>
    Edit Expense
</h1>

<br>

<div class="card">

<form action="/update_expense/{{ expense.id }}" method="POST">

<label><strong>Expense Name</strong></label>

<br><br>

<input
type="text"
name="expense_name"
value="{{ expense.expense_name }}"
required>

<br><br>

<label><strong>Amount (UGX)</strong></label>

<br><br>

<input
type="number"
name="amount"
step="0.01"
value="{{ expense.amount }}"
required>

<br><br>

<button type="submit" class="btn-save">

💾 Update Expense

</button>

<a href="/expenses" class="btn-view">

Cancel

</a>

</form>

</div>

{% endblock %}
